<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Lookup 起動中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top: 4px solid #3370ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .title { font-size: 16px; font-weight: 700; color: #334155; }
        .sub { font-size: 12px; color: #94a3b8; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="title">T-Lookup 起動中...</div>
    <div class="sub">サーバーを呼び出しています。そのままお待ちください。</div>

    <script>
        // 転送先のRender URL（認証キーを抜いたもの）
        var TARGET_URL = 'https://t-lookup-app.onrender.com/';

        // 3秒後に本体サーバーへ移動を試みる
        // サーバーが眠っていても、移動先の画面が「起動中」を表示してくれるので大丈夫です
        setTimeout(function() {
            window.location.href = TARGET_URL;
        }, 3000);
    </script>
</body>
</html>
