<script>
    var TARGET_URL = 'https://t-lookup-app.onrender.com/?key=tlookup2026';
    var bar = document.getElementById('bar');
    var statusText = document.getElementById('status-text');
    
    var maxSeconds = 60; // 最大60秒まで粘る
    var currentSeconds = 0;

    // 1. プログレスバーだけを動かすタイマー
    var visualTimer = setInterval(function() {
        currentSeconds++;
        var per = (currentSeconds / maxSeconds) * 100;
        bar.style.width = Math.min(per, 95) + '%'; // 100%直前で止めておく

        if (currentSeconds >= maxSeconds) {
            clearInterval(visualTimer);
            statusText.innerText = "起動に時間がかかっています。再読み込みしてください。";
        }
    }, 1000);

    // 2. サーバーが起きたかチェックし続ける関数
    async function checkServer() {
        try {
            // fetchでRenderのURLを叩く。mode: 'no-cors' は不透明な応答を許容しエラーを防ぐ
            await fetch(TARGET_URL, { mode: 'no-cors' });
            
            // 応答があった（＝起動した）ら即ジャンプ
            clearInterval(visualTimer);
            bar.style.width = '100%';
            statusText.innerText = "起動しました！";
            window.location.replace(TARGET_URL);
        } catch (e) {
            // 失敗（まだ寝てる）なら2秒後に再試行
            setTimeout(checkServer, 2000);
        }
    }

    // チェック開始
    checkServer();
</script>
