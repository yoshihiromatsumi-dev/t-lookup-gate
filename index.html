<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Lookup 起動中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
            background: #f8fafc;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3370ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .title { font-size: 16px; font-weight: 700; color: #334155; }
        .sub { font-size: 12px; color: #94a3b8; margin-top: 6px; }
        .progress-track {
            width: 200px; height: 4px; background: #e2e8f0;
            border-radius: 2px; overflow: hidden; margin-top: 16px;
        }
        .progress-bar {
            width: 0%; height: 100%; background: #3370ff;
            border-radius: 2px; transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="title">T-Lookup 起動中...</div>
    <div class="sub">最大60秒ほどお待ちください</div>
    <div class="progress-track">
        <div id="bar" class="progress-bar"></div>
    </div>

    <script>
        var RENDER_URL = 'https://t-lookup-app.onrender.com';
        var SECRET_KEY = 'tlookup2026';
        var bar = document.getElementById('bar');
        var progress = 0;

        var progressInterval = setInterval(function() {
            progress = Math.min(progress + 2, 90);
            bar.style.width = progress + '%';
        }, 1000);

        function checkHealth() {
            fetch(RENDER_URL + '/api/health')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.status === 'ok') {
                        clearInterval(progressInterval);
                        bar.style.width = '100%';
                        setTimeout(function() {
                            window.location.href = RENDER_URL + '/?key=' + SECRET_KEY;
                        }, 500);
                    }
                })
                .catch(function() {
                    setTimeout(checkHealth, 3000);
                });
        }

        checkHealth();
    </script>
</body>
</html>
