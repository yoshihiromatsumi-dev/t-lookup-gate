<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Lookup 起動中...</title>
    <style>
        /* 前のスタイリッシュなデザインをすべて復元 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3370ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .title {
            font-size: 16px;
            font-weight: 700;
            color: #334155;
        }
        .sub {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
            text-align: center;
        }
        .progress-track {
            width: 200px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 16px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #3370ff;
            /* transitionを少し速くしてレスポンス感を出す */
            transition: width 0.4s ease-out;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="title">T-Lookup 起動中...</div>
    <div id="status-text" class="sub">サーバーを準備しています（約35秒）</div>
    <div class="progress-track">
        <div id="bar" class="progress-bar"></div>
    </div>

    <script>
        var TARGET_URL = 'https://t-lookup-app.onrender.com/?key=tlookup2026';
        var bar = document.getElementById('bar');
        var statusText = document.getElementById('status-text');
        
        var maxWaitSeconds = 60; // 念のため60秒まで粘る
        var currentSeconds = 0;

        // 1. プログレスバーのアニメーション
        // サーバーが起きるまでジワジワ進み、90%で一旦止まって待機する演出
        var visualTimer = setInterval(function() {
            currentSeconds++;
            var progress = (currentSeconds / 40) * 90; // 40秒で90%に到達するペース
            bar.style.width = Math.min(progress, 90) + '%';

            if (currentSeconds >= maxWaitSeconds) {
                clearInterval(visualTimer);
                statusText.innerHTML = "起動に時間がかかっています。<br>一度閉じて再度開いてみてください。";
            }
        }, 1000);

        // 2. サーバー起動確認（ポーリング）
        function checkServer() {
            fetch(TARGET_URL, { mode: 'no-cors' })
                .then(function() {
                    // 成功（Renderが起きた！）
                    clearInterval(visualTimer);
                    bar.style.width = '100%';
                    statusText.innerText = "起動しました！";
                    
                    // 完了の余韻を持たせてからジャンプ
                    setTimeout(function() {
                        window.location.replace(TARGET_URL);
                    }, 600);
                })
                .catch(function() {
                    // 失敗（まだ寝てる）なら2秒後に再試行
                    setTimeout(checkServer, 2000);
                });
        }

        // 実行開始
        checkServer();
    </script>
</body>
</html>
